<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat | AkinTechnologies</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #0D1B2E;
      --navy-card:  #122240;
      --navy-input: #1A2D45;
      --mint:       #6EE7B7;
      --mint-dim:   #3a7a62;
      --white:      #F0F6FF;
      --muted:      #7A90A8;
      --user-bubble:#1A3A5C;
      --ai-bubble:  #122240;
      --border:     rgba(110,231,183,0.12);
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ── */
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      padding: 20px 24px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--navy);
      overflow: hidden;
      flex-shrink: 0;
    }

    /* circuit line decoration */
    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: linear-gradient(to right, transparent, rgba(0,0,0,0.4) 30%, rgba(0,0,0,0.4) 70%, transparent);
      pointer-events: none;
    }

    .header-inner {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--mint-dim), var(--mint));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--navy);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--mint);
    }

    .status-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--mint);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* welcome state */
    .welcome {
      margin: auto;
      text-align: center;
      padding: 40px 20px;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--mint-dim), var(--mint));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }

    .welcome h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .welcome p {
      font-size: 14px;
      color: var(--muted);
      max-width: 340px;
      line-height: 1.6;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 24px;
    }

    .chip {
      background: var(--navy-card);
      border: 1px solid var(--border);
      color: var(--white);
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .chip:hover {
      border-color: var(--mint);
      background: var(--navy-input);
    }

    /* message rows */
    .msg-row {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.25s ease;
    }

    .msg-row.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      margin-top: 2px;
    }

    .avatar.ai-avatar {
      background: linear-gradient(135deg, var(--mint-dim), var(--mint));
      color: var(--navy);
    }

    .avatar.user-avatar {
      background: var(--user-bubble);
      color: var(--mint);
      border: 1px solid var(--border);
    }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
    }

    .ai-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--white);
    }

    .user-bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(110,231,183,0.18);
      border-top-right-radius: 4px;
      color: var(--white);
    }

    .bubble-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .msg-row.user .bubble-meta { text-align: right; }

    /* typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--mint);
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── INPUT BAR ── */
    .input-bar {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--navy);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--navy-input);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--mint);
    }

    #msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 120px;
      min-height: 22px;
    }

    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: var(--mint);
      color: var(--navy);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    #send-btn:hover:not(:disabled) { opacity: 0.85; }
    #send-btn:active:not(:disabled) { transform: scale(0.94); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #send-btn svg { width: 16px; height: 16px; }

    .input-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      padding: 0 4px;
    }

    /* error toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #3D1A1A;
      border: 1px solid #7A2020;
      color: #FFB3B3;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 10px;
      display: none;
      z-index: 100;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .messages { padding: 20px 16px; }
      .input-bar { padding: 12px 16px 16px; }
      .bubble { max-width: 85%; }
      .welcome h2 { font-size: 18px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo-mark">AT</div>
      <div class="header-text">
        <h1>AkinTechnologies AI</h1>
        <p>Powered by Amazon Bedrock · Claude 3 Sonnet</p>
      </div>
      <div class="status-dot">Online</div>
    </div>
  </header>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⚡</div>
      <h2>What can I help you with?</h2>
      <p>Ask me anything — cloud architecture, DevOps, AWS, Terraform, or anything else on your mind.</p>
      <div class="suggestion-chips">
        <button class="chip" onclick="sendChip(this)">What is Infrastructure as Code?</button>
        <button class="chip" onclick="sendChip(this)">Explain Kubernetes in simple terms</button>
        <button class="chip" onclick="sendChip(this)">What is a Lambda function?</button>
        <button class="chip" onclick="sendChip(this)">Difference between AWS and Azure</button>
      </div>
    </div>
  </div>

  <!-- INPUT BAR -->
  <div class="input-bar">
    <div class="input-wrap">
      <textarea
        id="msg-input"
        placeholder="Ask anything..."
        rows="1"
        aria-label="Message input"
      ></textarea>
      <button id="send-btn" aria-label="Send message" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── CONFIG ──
  // Replace with your actual API Gateway URL after terraform apply
  const API_URL = 'https://YOUR_API_GATEWAY_ID.execute-api.us-east-1.amazonaws.com/chat';

  // ── STATE ──
  const sessionId = 'session-' + Math.random().toString(36).slice(2, 10);
  let isLoading = false;

  // ── ELEMENTS ──
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');
  const welcome    = document.getElementById('welcome');
  const toast      = document.getElementById('toast');

  // ── AUTO-RESIZE TEXTAREA ──
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    sendBtn.disabled = !inputEl.value.trim() || isLoading;
  });

  // ── KEYBOARD SHORTCUT ──
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── SUGGESTION CHIPS ──
  function sendChip(btn) {
    inputEl.value = btn.textContent;
    sendBtn.disabled = false;
    sendMessage();
  }

  // ── SEND MESSAGE ──
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    // hide welcome screen on first message
    if (welcome) welcome.remove();

    isLoading = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    const typingEl = appendTyping();
    scrollToBottom();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, sessionId }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      typingEl.remove();
      appendMessage('ai', data.reply);
    } catch (err) {
      typingEl.remove();
      showToast('Something went wrong. Please try again.');
      console.error(err);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
      scrollToBottom();
    }
  }

  // ── RENDER HELPERS ──
  function appendMessage(role, text) {
    const isUser = role === 'user';
    const time   = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const row = document.createElement('div');
    row.className = `msg-row ${isUser ? 'user' : 'ai'}`;

    row.innerHTML = `
      <div class="avatar ${isUser ? 'user-avatar' : 'ai-avatar'}">
        ${isUser ? 'You' : 'AT'}
      </div>
      <div>
        <div class="bubble ${isUser ? 'user-bubble' : 'ai-bubble'}">
          ${escapeHTML(text).replace(/\n/g, '<br>')}
        </div>
        <div class="bubble-meta">${time}</div>
      </div>
    `;

    messagesEl.appendChild(row);
    return row;
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.innerHTML = `
      <div class="avatar ai-avatar">AT</div>
      <div class="bubble ai-bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    messagesEl.appendChild(row);
    return row;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHTML(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 4000);
  }
</script>
</body>
</html>
