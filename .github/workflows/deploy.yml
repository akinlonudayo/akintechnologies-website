name: Deploy AkinTechnologies Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── LAMBDA: install dependencies before Terraform zips it ──
      - name: Install Lambda chat dependencies
        run: |
          cd lambda-chat
          npm ci

      # ── TERRAFORM: provision / update all infrastructure ──
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false  # needed so we can capture raw output values

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      # ── INJECT: grab API URL from Terraform and write it into chat.html ──
      - name: Inject API URL into chat.html
        run: |
          API_URL=$(terraform output -raw chat_api_url)
          echo "API URL: $API_URL"
          sed -i "s|https://YOUR_API_GATEWAY_ID.execute-api.us-east-1.amazonaws.com/chat|$API_URL|g" chat.html

      # ── S3: sync all site files including the updated chat.html ──
      - name: Sync files to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "lambda-chat/*" \
            --exclude "*.tf" \
            --exclude "*.tfstate" \
            --exclude "*.tfstate.backup" \
            --exclude ".terraform/*" \
            --exclude "lambda-chat.zip"

      # ── CLOUDFRONT: bust cache so users see latest version immediately ──
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"